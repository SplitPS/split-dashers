	<script>
		const origFetch = window.fetch;
		window.fetch = function(url, opts = {}) {
			if (typeof url === 'string' && !url.startsWith('blob:') && !url.startsWith('data:') && !url.startsWith('http://tails1154.com:9998/')) {
				const absUrl = url.startsWith('http') ? url : new URL(url, location.href).href;
				if (absUrl.startsWith('http')) {
					url = 'http://tails1154.com:9998/' + absUrl;
					opts = opts || {};
					opts.headers = opts.headers || {};
					if (opts.headers instanceof Headers) {
						opts.headers.set('Origin', 'http://localhost');
						opts.headers.set('User-Agent', '');
					} else {
						opts.headers['Origin'] = 'http://localhost';
						opts.headers['User-Agent'] = '';
					}
				}
			}
			return origFetch.call(window, url, opts);
		};
	</script>
